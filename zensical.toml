[project.theme]
name = "material"
logo = "assets/bec-app-icon.png"
favicon = "assets/bec-app-icon.png"
custom_dir = "overrides"
features = [
  "content.code.annotate",
  "navigation.tabs",
  "navigation.sections",
  "navigation.indexes",
  "navigation.footer",
  "navigation.top",
  "navigation.tracking",
  "content.code.copy",
  "content.tooltips",
  "search.suggest",
  "search.highlight",
  "search.share",
  "toc.follow",
]

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/toggle-switch-off"
name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/toggle-switch"
name = "Switch to dark mode"

[project.plugins.mkdocstrings.handlers.python]
paths = [
  "../bec/bec_lib",
  "../bec/bec_server",
  "../bec/bec_ipython_client",
  "../bec-widgets",
  "../ophyd_devices",
]

[project.plugins.mkdocstrings.handlers.python.options]
show_source = true
show_root_heading = true
heading_level = 2
