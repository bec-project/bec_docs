[project]
site_name = "BEC Documentation"
site_url = "https://bec-project.github.io/bec_docs/"
site_author = "BEC developers"
site_description = "Unified BEC documentation organized with the Diataxis framework"
docs_dir = "docs"
use_directory_urls = false
repo_name = "bec-project"
repo_url = "https://github.com/bec-project"
copyright = "Copyright &copy; BEC contributors"
extra_css = ["stylesheets/extra.css"]


nav = [
  { Home = "index.md" },
  { "Getting started" = [
    "getting-started/index.md",
    { "Quick start" = [
      "getting-started/quick-start/index.md",
      { "01 Open BEC" = "getting-started/open-bec-at-psi.md" },
      { "02 Open BEC outside of PSI" = "getting-started/open-bec-outside-psi.md" },
      { "03 Load your first config" = "getting-started/load-your-first-config.md" },
      { "04 Move a device" = "getting-started/move-a-device.md" },
      { "05 Inspect a device" = "getting-started/inspect-a-device.md" },
      { "06 Run your first scan" = "getting-started/run-your-first-scan.md" },
      { "07 Create your first GUI" = "getting-started/create-your-first-gui.md" },
    ] },
    { "Next steps" = [
      "getting-started/next-steps/index.md",
      { "Add your first device" = "getting-started/add-your-first-device.md" },
      { "Load and export a config" = "getting-started/load-and-export-a-config.md" },
      { "Access scan data" = "getting-started/access-scan-data.md" },
      { "Run an alignment scan" = "getting-started/run-an-alignment-scan.md" },
      { "Write your first macro" = "getting-started/write-your-first-macro.md" },
    ] },
  ] },
  { "How-to Guides" = [
    "how-to/index.md",
    { General = [
      { "Connect to the BEC VM with xfreerdp" = "how-to/general/connect-to-the-bec-vm-with-xfreerdp.md" },
      { "Update BEC to a new version" = "how-to/general/update-deployment.md" },
    ] },
    { "Working with Git" = [
      "how-to/git/index.md",
      { "Add changes to your plugin repository" = "how-to/git/add-changes-to-plugin-repository.md" },
      { "Merge changes to main" = "how-to/git/merge-changes-to-main.md" },
    ] },
    { "Devices and scans" = [
      { Devices = [
        "how-to/devices/index.md",
        { "Add an EPICS motor" = "how-to/devices/add-an-epics-motor.md" },
        { "Add an EPICS signal" = "how-to/devices/add-an-epics-signal.md" },
      ] },
      { Scans = [
        "how-to/scans/index.md",
      ] },
    ] },
    { "Customize BEC" = [
      "how-to/customize-bec/index.md",
      { "Add a custom NeXuS structure for the file writer" = "how-to/customize-bec/add-a-custom-nexus-structure.md" },
    ] },
  ] },
  { Learn = [
    { "System architecture" = [
      "learn/system-architecture/index.md",
    ] },
    { Devices = [
      { "EPICS Motor Variants" = "learn/devices/epics-motors.md" },
      { "EPICS Signal Variants" = "learn/devices/epics-signals.md" },
      { "BEC Signals" = "learn/devices/bec-signals.md" },
    ] },
    { "Scans and execution" = [
      "learn/scans-and-execution/index.md",
    ] },
    { "File Writing" = [
      "learn/file-writer/index.md",
      { "Where Files Are Written" = "learn/file-writer/where-files-are-written.md" },
      { "Default HDF5 Layout" = "learn/file-writer/default-format.md" },
      { "Customizing the File Writer" = "learn/file-writer/plugin-repository-integration.md" },
      { "Async and Sync File Writing" = "learn/file-writer/async-and-sync-writers.md" },
      { "File References from Devices" = "learn/file-writer/file-references.md" },
    ] },
    { "Operations and deployment" = [
      "learn/operations-and-deployment/index.md",
    ] },
    { "GUI framework" = [
      "learn/gui-framework/index.md",
    ] },
    { "Plugins and extensions" = [
      "learn/plugins-and-extensions/index.md",
    ] },
  ] },
  { References = [
    "references/index.md",
    { "BEC Core" = [
      "references/bec-core/index.md",
      { "Scan Base and stubs" = "references/bec-core/scan-base-and-stubs.md" },
      { "Scans" = "references/bec-core/scans.md" },
    ] },
    { "BEC Widgets" = [
      "references/bec-widgets/index.md",
      { "BECWidget vs BECConnector" = "references/bec-widgets/becwidget-vs-becconnector.md" },
      { "Widget gallery" = "references/bec-widgets/widget-gallery.md" },
    ] },
    { "Ophyd devices" = [
      "references/ophyd-devices/index.md",
      { "AsyncSignal" = "references/ophyd-devices/async-signal.md" },
      { "AsyncMultiSignal" = "references/ophyd-devices/async-multi-signal.md" },
      { "ProgressSignal" = "references/ophyd-devices/progress-signal.md" },
      { "PSIDeviceBase" = "references/ophyd-devices/psi-device-base.md" },
      { "Device config templates" = "references/ophyd-devices/device-config-templates.md" },
      { Devices = "references/ophyd-devices/devices.md" },
    ] },
  ] },
]

[project.extra.page_badges.psi]
light = "assets/psi_01_sp.png"
dark = "assets/psi_01_sn.png"
alt = "PSI-specific"

[project.theme]
name = "material"
logo = "assets/bec-app-icon.png"
favicon = "assets/bec-app-icon.png"
custom_dir = "overrides"
features = [
  "content.code.annotate",
  "navigation.tabs",
  "navigation.sections",
  "navigation.indexes",
  "navigation.footer",
  "navigation.top",
  "navigation.tracking",
  "content.code.copy",
  "content.tooltips",
  "search.suggest",
  "search.highlight",
  "search.share",
  "toc.follow",
]

[project.theme.font]
text = "Roboto"
code = "Jetbrains Mono"

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/toggle-switch-off"
name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/toggle-switch"
name = "Switch to dark mode"

[project.plugins.mkdocstrings.handlers.python]
paths = [
  "../bec/bec_lib",
  "../bec/bec_server",
  "../bec/bec_ipython_client",
  "../bec-widgets",
  "../ophyd_devices",
]

[project.plugins.mkdocstrings.handlers.python.options]
show_source = true
show_root_heading = true
heading_level = 2


[project.markdown_extensions.bec_docs_pymdown_extensions]

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.blocks.tab]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]


[project.extra.analytics]
provider = "google"
property = "G-GKREZ8B06M"

[project.extra.analytics.feedback]
title = "Was this page helpful?"

[[project.extra.analytics.feedback.ratings]]
icon = "material/thumb-up-outline"
name = "This page was helpful"
data = 1
note = "Thanks for your feedback!"

[[project.extra.analytics.feedback.ratings]]
icon = "material/thumb-down-outline"
name = "This page could be improved"
data = 0
note = """
Thanks for your feedback! Help us improve this page by opening a
<a href="https://github.com/bec-project/bec_docs/issues/new?title=%5BFeedback%5D+%7Btitle%7D+-+%7Burl%7D" target="_blank" rel="noopener">documentation feedback issue</a>.
"""
