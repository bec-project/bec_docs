[project.extra.page_badges.psi]
light = "assets/psi_01_sp.png"
dark = "assets/psi_01_sn.png"
alt = "PSI-specific"

[project.theme]
name = "material"
logo = "assets/bec-app-icon.png"
favicon = "assets/bec-app-icon.png"
custom_dir = "overrides"
features = [
  "content.code.annotate",
  "navigation.tabs",
  "navigation.sections",
  "navigation.indexes",
  "navigation.footer",
  "navigation.top",
  "navigation.tracking",
  "content.code.copy",
  "content.tooltips",
  "search.suggest",
  "search.highlight",
  "search.share",
  "toc.follow",
]

[project.theme.font]
text = "Roboto"
code = "Jetbrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/toggle-switch-off"
name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "indigo"

[project.theme.palette.toggle]
icon = "material/toggle-switch"
name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = [
  "../bec/bec_lib",
  "../bec/bec_server",
  "../bec/bec_ipython_client",
  "../bec-widgets",
  "../ophyd_devices",
]

[project.plugins.mkdocstrings.handlers.python.options]
show_source = true
show_root_heading = true
heading_level = 2


[project.markdown_extensions.bec_docs_pymdown_extensions]

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
smart_enable = "all"
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.pymdownx.blocks.tab]
alternate_style = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]


[project.extra.analytics]
provider = "google"
property = "G-GKREZ8B06M"

[project.extra.analytics.feedback]
title = "Was this page helpful?"

[[project.extra.analytics.feedback.ratings]]
icon = "material/thumb-up-outline"
name = "This page was helpful"
data = 1
note = "Thanks for your feedback!"

[[project.extra.analytics.feedback.ratings]]
icon = "material/thumb-down-outline"
name = "This page could be improved"
data = 0
note = """
Thanks for your feedback! Help us improve this page by opening a
<a href="https://github.com/bec-project/bec_docs/issues/new?title=%5BFeedback%5D+%7Btitle%7D+-+%7Burl%7D" target="_blank" rel="noopener">documentation feedback issue</a>.
"""
