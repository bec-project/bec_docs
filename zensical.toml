docs_dir = "docs"
use_directory_urls = false
repo_name = "bec-project"
repo_url = "https://github.com/bec-project"
copyright = "Copyright &copy; BEC contributors"
extra_css = ["stylesheets/extra.css"]

[project.extra.analytics]
provider = "google"
property = "G-GKREZ8B06M"

[project.extra.analytics.feedback]
title = "Was this page helpful?"

