<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="980" viewBox="0 0 1560 980" role="img" aria-labelledby="title desc">
  <title id="title">Resulting NeXus structure for the custom format example</title>
  <desc id="desc">Simplified three-column block diagram of the resulting HDF5 and NeXus tree. Nesting is arranged horizontally, with centered straight connectors and color-coded datasets for regular, external-link, and soft-link entries.</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { font: 700 28px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #16324f; }
      .subtitle { font: 500 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #44607d; }
      .group { fill: #ffffff; stroke: #2b5d8a; stroke-width: 2.5; }
      .group-optional { fill: #fffdf8; stroke: #c48a2c; stroke-width: 2.5; stroke-dasharray: 10 8; }
      .dataset { fill: #edf4fb; stroke: #7b9bb8; stroke-width: 1.6; }
      .dataset-soft { fill: #edf8f1; stroke: #2d7d46; stroke-width: 1.8; }
      .dataset-ext { fill: #f3efff; stroke: #8a3ffc; stroke-width: 1.8; }
      .text { font: 600 18px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #16324f; }
      .small { font: 500 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #35526d; }
      .tiny { font: 500 13px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #516b84; }
      .tiny-bold { font: 700 12px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #16324f; }
      .line { stroke: #5d7896; stroke-width: 2.5; fill: none; }
      .line-dashed { stroke: #c48a2c; stroke-width: 2.5; fill: none; stroke-dasharray: 8 6; }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5d7896"/>
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c48a2c"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1560" height="980"/>

  <g transform="translate(20 0)">
  <text class="title" x="36" y="48">Resulting NeXus / HDF5 structure for the guide example</text>
  <text class="subtitle" x="36" y="78">Horizontal flow shows nesting. Dashed blocks are conditional.</text>
  </g>

  <g transform="translate(-20 0)">
  <rect class="group" x="220" y="380" width="270" height="220" rx="18" ry="18"/>
  <text class="text" x="248" y="424">entry</text>
  <text class="small" x="248" y="456">group</text>
  <text class="tiny" x="248" y="494">@NX_class = NXentry</text>

  <rect class="group" x="650" y="120" width="320" height="170" rx="18" ry="18"/>
  <text class="text" x="678" y="162">collection</text>
  <text class="tiny" x="678" y="202">@NX_class = NXcollection</text>

  <rect class="group" x="650" y="320" width="320" height="150" rx="18" ry="18"/>
  <text class="text" x="678" y="362">control</text>
  <text class="tiny" x="678" y="402">@NX_class = NXmonitor</text>

  <rect class="group-optional" x="650" y="520" width="320" height="150" rx="18" ry="18"/>
  <text class="text" x="678" y="562">instrument</text>
  <text class="tiny" x="678" y="602">@NX_class = NXinstrument</text>

  <rect class="group-optional" x="650" y="720" width="320" height="150" rx="18" ry="18"/>
  <text class="text" x="678" y="762">data</text>
  <text class="tiny" x="678" y="802">@NX_class = NXdata</text>

  <path class="line" d="M490 490 H570"/>
  <path class="line" d="M570 205 V795"/>
  <path class="line" d="M570 205 H650" marker-end="url(#arrow-blue)"/>
  <path class="line" d="M570 395 H650" marker-end="url(#arrow-blue)"/>
  <path class="line-dashed" d="M570 595 H650" marker-end="url(#arrow-gold)"/>
  <path class="line-dashed" d="M570 795 H650" marker-end="url(#arrow-gold)"/>

  <rect class="group" x="1080" y="120" width="360" height="194" rx="18" ry="18"/>
  <text class="text" x="1108" y="162">collection</text>
  <text class="tiny" x="1108" y="194">@NX_class = NXcollection</text>
  <rect class="dataset" x="1108" y="214" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1124" y="231">devices</text>
  <rect class="dataset" x="1268" y="214" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1284" y="231">configuration</text>
  <rect class="dataset" x="1108" y="246" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1124" y="263">metadata</text>
  <rect class="dataset" x="1268" y="246" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1284" y="263">readout_groups</text>
  <rect class="dataset-ext" x="1108" y="278" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1124" y="295">file_references</text>
  <rect class="dataset" x="1268" y="278" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1284" y="295">states</text>

  <rect class="group" x="1080" y="320" width="360" height="150" rx="18" ry="18"/>
  <text class="text" x="1108" y="362">control</text>
  <text class="tiny" x="1108" y="394">@NX_class = NXmonitor</text>
  <rect class="dataset" x="1108" y="414" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1124" y="431">mode</text>
  <rect class="dataset" x="1268" y="414" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1284" y="431">integral</text>

  <rect class="group-optional" x="1080" y="520" width="360" height="170" rx="18" ry="18"/>
  <text class="text" x="1108" y="562">eiger</text>
  <text class="tiny" x="1108" y="594">@NX_class = NXdetector</text>
  <rect class="dataset-ext" x="1108" y="620" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1124" y="637">data</text>

  <rect class="group-optional" x="1080" y="720" width="360" height="150" rx="18" ry="18"/>
  <text class="text" x="1108" y="762">data</text>
  <text class="tiny" x="1108" y="794">@NX_class = NXdata</text>
  <rect class="dataset-soft" x="1108" y="814" width="140" height="26" rx="10" ry="10"/>
  <text class="tiny" x="1124" y="831">data</text>
  <text class="tiny-bold" x="1108" y="858">target: /entry/instrument/eiger/data</text>

  <path class="line" d="M970 195 H1080" marker-end="url(#arrow-blue)"/>
  <path class="line" d="M970 395 H1080" marker-end="url(#arrow-blue)"/>
  <path class="line-dashed" d="M970 595 H1080" marker-end="url(#arrow-gold)"/>
  <path class="line-dashed" d="M970 795 H1080" marker-end="url(#arrow-gold)"/>
  </g>
</svg>
